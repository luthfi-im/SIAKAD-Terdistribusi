services:
  laravel.test:
    build:
      context: ./vendor/laravel/sail/runtimes/8.2
      dockerfile: Dockerfile
      args:
        WWWGROUP: "${WWWGROUP}"
    image: sail-8.2/app
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      WWWUSER: "${WWWUSER}"
      LARAVEL_SAIL: 1
      XDEBUG_MODE: "${SAIL_XDEBUG_MODE:-off}"
      XDEBUG_CONFIG: "${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}"
    volumes:
      - ".:/var/www/html"
      - "./docker/supervisor/supervisord.conf:/etc/supervisor/conf.d/supervisord.conf"
      - "./docker/supervisor/queue-worker.conf:/etc/supervisor/conf.d/queue-worker.conf"
    networks:
      - siakad-network
    depends_on:
      - pgsql
      - pgsql_r2
      - pgsql_r3
      - pgsql_pusat
      - redis

  nginx:
    image: "nginx:alpine"
    ports:
      - "80:80"
    volumes:
      - "./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf"
    networks:
      - siakad-network
    depends_on:
      - laravel.test

  pgsql:
    image: "soldevelo/postgresql-repmgr:15"
    ports:
      - "${FORWARD_DB_PORT:-5432}:5432"
    environment:
      POSTGRESQL_USERNAME: "${DB_USERNAME}"
      POSTGRESQL_PASSWORD: "${DB_PASSWORD:-secret}"
      POSTGRESQL_POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
      POSTGRESQL_DATABASE: "siakad_r1"
      REPMGR_PASSWORD: "repmgrpass123"
      REPMGR_PRIMARY_HOST: "pgsql_r1a"
      REPMGR_PRIMARY_PORT: "5432"
      REPMGR_PARTNER_NODES: "pgsql,pgsql_r1a"
      REPMGR_NODE_ID: "1"
      REPMGR_NODE_NAME: "pgsql-1"
      REPMGR_NODE_NETWORK_NAME: "pgsql"
      REPMGR_PORT_NUMBER: "5432"
    volumes:
      - "siakad-pgsql-vol:/bitnami/postgresql"
    networks:
      - siakad-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USERNAME}" ]
      retries: 5
      timeout: 5s

  pgsql_r2:
    image: "postgres:15-alpine"
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: "siakad_regional2"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - "siakad-pgsql-r2-vol:/var/lib/postgresql/data"
    networks:
      - siakad-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "siakad_regional2", "-U", "${DB_USERNAME}" ]
      retries: 3
      timeout: 5s

  pgsql_r3:
    image: "postgres:15-alpine"
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: "siakad_regional3"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - "siakad-pgsql-r3-vol:/var/lib/postgresql/data"
    networks:
      - siakad-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "siakad_regional3", "-U", "${DB_USERNAME}" ]
      retries: 3
      timeout: 5s

  pgsql_pusat:
    image: "postgres:15-alpine"
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: "siakad_pusat"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - "siakad-pgsql-pusat-vol:/var/lib/postgresql/data"
    networks:
      - siakad-network
    healthcheck:
      test: [ "CMD", "pg_isready", "-q", "-d", "siakad_pusat", "-U", "${DB_USERNAME}" ]
      retries: 3
      timeout: 5s

  pgsql_r1a:
    image: "soldevelo/postgresql-repmgr:15"
    ports:
      - "5436:5432"
    environment:
      POSTGRESQL_USERNAME: "${DB_USERNAME}"
      POSTGRESQL_PASSWORD: "${DB_PASSWORD:-secret}"
      POSTGRESQL_POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
      POSTGRESQL_DATABASE: "siakad_r1"
      REPMGR_PASSWORD: "repmgrpass123"
      REPMGR_PRIMARY_HOST: "pgsql"
      REPMGR_PRIMARY_PORT: "5432"
      REPMGR_PARTNER_NODES: "pgsql,pgsql_r1a"
      REPMGR_NODE_ID: "2"
      REPMGR_NODE_NAME: "pgsql_r1a-2"
      REPMGR_NODE_NETWORK_NAME: "pgsql_r1a"
      REPMGR_PORT_NUMBER: "5432"
    volumes:
      - "siakad-pgsql-r1a-vol:/bitnami/postgresql"
    networks:
      - siakad-network
    depends_on:
      - pgsql
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${DB_USERNAME}" ]
      retries: 5
      timeout: 5s

  pgsql_r2a:
    image: "postgres:15-alpine"
    ports:
      - "5437:5432"
    environment:
      POSTGRES_DB: "siakad_regional2"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - "siakad-pgsql-r2a-vol:/var/lib/postgresql/data"
    networks:
      - siakad-network
    depends_on:
      - pgsql_r2

  pgsql_r3a:
    image: "postgres:15-alpine"
    ports:
      - "5438:5432"
    environment:
      POSTGRES_DB: "siakad_regional3"
      POSTGRES_USER: "${DB_USERNAME}"
      POSTGRES_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - "siakad-pgsql-r3a-vol:/var/lib/postgresql/data"
    networks:
      - siakad-network
    depends_on:
      - pgsql_r3

  redis:
    image: "redis:7-alpine"
    command: redis-server --appendonly yes
    ports:
      - "${FORWARD_REDIS_PORT:-6379}:6379"
    volumes:
      - "siakad-redis-vol:/data"
    networks:
      - siakad-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      retries: 3
      timeout: 5s

  haproxy:
    build:
      context: ./docker/haproxy
    ports:
      - "5000:5000"
    networks:
      - siakad-network
    depends_on:
      - pgsql
      - pgsql_r1a

networks:
  siakad-network:
    driver: bridge

volumes:
  siakad-pgsql-vol:
    driver: local
  siakad-pgsql-r2-vol:
    driver: local
  siakad-pgsql-r3-vol:
    driver: local
  siakad-pgsql-pusat-vol:
    driver: local
  siakad-redis-vol:
    driver: local
  siakad-pgsql-r1a-vol:
    driver: local
  siakad-pgsql-r2a-vol:
    driver: local
  siakad-pgsql-r3a-vol:
    driver: local
